name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health check
        run: |
          curl --fail --silent --show-error --max-time 120 --retry 3 --retry-delay 20 \
            https://camosignal-weekly-trending-collections.onrender.com/healthz
