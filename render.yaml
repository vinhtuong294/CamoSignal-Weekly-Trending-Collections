services:
  - type: web
    name: camosignal-weekly-trending-collections
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        value: https://camosignal-weekly-trending-collections.onrender.com
      - key: SCOPES
        value: read_orders,read_products,write_products
      - key: DATABASE_URL
        sync: false
